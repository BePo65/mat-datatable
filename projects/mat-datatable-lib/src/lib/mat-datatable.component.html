<mat-progress-bar
  [ngClass]="{ 'mat-datatable-loading-hide': (dataSource.loading$ | async) === false }"
  class="mat-datatable-loading-spinner"
  color="primary"
  mode="indeterminate"
>
</mat-progress-bar>
<cdk-virtual-scroll-viewport
  #tvs="table-virtual-scroll"
  tvsItemSize="52"
  [footerEnabled]="withFooter"
  class="mat-datatable-viewport"
>
  <table
    mat-table
    matMultiSort
    class="full-width-table mat-datatable"
    [dataSource]="dataSource"
    [trackBy]="_trackByFn"
    (matMultiSortChange)="onMultiSortChanged($event)"
  >
    <ng-container *ngFor="let column of columnDefinitions" [matColumnDef]="column.columnId">
      <th
        mat-header-cell
        class="mat-datatable-header-cell"
        *matHeaderCellDef
        mat-multi-sort-header
        [disabled]="!column.sortable"
        [ngStyle]="headerFormat(column)"
        [arrowPosition]="sortArrowPosition(column)"
        [matHeaderAlignment]="column.headerAlignment"
        [matResizable]="column.resizable"
      >
        {{ column.header }}
      </th>
      <td
        mat-cell
        class="mat-datatable-cell"
        *matCellDef="let row"
        [ngClass]="{ 'mat-datatable-single-line': column.showAsSingleLine }"
        [ngStyle]="columnFormat(column)"
        [attr.title]="column.tooltip?.(row)"
      >
        <span *ngIf="column.cell(row).type === 'string'">{{
          (column.cell(row) | cast: StringCell).text
        }}</span>
        <ng-container *ngIf="column.cell(row).type === 'mailtoLink'"
          ><a
            [href]="'mailto:' + (column.cell(row) | cast: MailToCell).url"
            onclick="event.stopPropagation()"
            >{{ (column.cell(row) | cast: MailToCell).text }}</a
          ></ng-container
        >
        <ng-container *ngIf="column.cell(row).type === 'image'">
          <img
            [src]="(column.cell(row) | cast: ImageCell).url"
            [alt]="(column.cell(row) | cast: ImageCell).altText"
            [attr.title]="(column.cell(row) | cast: ImageCell).title"
        /></ng-container>
      </td>
      <td
        mat-footer-cell
        *matFooterCellDef
        [ngStyle]="footerColumnFormat(column?.footerAlignment)"
        [attr.colspan]="column?.footerColumnSpan"
        class="mat-datatable-footer-cell"
      >
        {{ column.footer }}
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr
      mat-row
      class="mat-datatable-row"
      *matRowDef="let row; columns: displayedColumns"
      [ngClass]="{
        'selected-row': selectedRowsIncludes(row),
        'activated-row': currentActivatedRow !== undefined && areRowsEqual(currentActivatedRow, row)
      }"
      (click)="onRowClicked(row)"
    ></tr>
    <ng-container *ngIf="withFooter">
      <tr
        mat-footer-row
        *matFooterRowDef="displayedFooterColumns; sticky: true"
        class="footer-row"
      ></tr>
    </ng-container>
  </table>
</cdk-virtual-scroll-viewport>
